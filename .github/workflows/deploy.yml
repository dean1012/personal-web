---
name: Deploy

"on":
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
      && (
        github.event_name != 'push'
        || !contains(github.event.head_commit.message, '[skip deploy]')
      )

    steps:
      - name: Wait for matching CI success
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
          GITHUB_REF_BRANCH: ${{ github.ref_name }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.parse
          import urllib.request

          token = os.environ["GITHUB_TOKEN"]
          repository = os.environ["GITHUB_REPOSITORY_NAME"]
          branch = os.environ["GITHUB_REF_BRANCH"]
          sha = os.environ["GITHUB_SHA_VALUE"]
          encoded_branch = urllib.parse.quote(branch, safe="")
          url = (
              f"https://api.github.com/repos/{repository}/actions/workflows/ci.yml/runs"
              f"?branch={encoded_branch}&event=push&per_page=20"
          )
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          deadline = time.time() + 30 * 60
          while time.time() < deadline:
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=30) as response:
                  payload = json.loads(response.read().decode("utf-8"))

              matching_runs = [
                  run for run in payload.get("workflow_runs", [])
                  if run.get("head_sha") == sha
              ]
              if matching_runs:
                  run = matching_runs[0]
                  status = run.get("status")
                  conclusion = run.get("conclusion")
                  html_url = run.get("html_url")
                  print(f"Matching CI run: status={status} conclusion={conclusion} url={html_url}")
                  if status == "completed":
                      if conclusion == "success":
                          raise SystemExit(0)
                      raise SystemExit(f"Matching CI run concluded {conclusion}; deployment blocked")
              else:
                  print(f"No matching CI run found yet for {branch} {sha}")

              time.sleep(10)

          print(f"Timed out waiting for matching CI success for {branch} {sha}", file=sys.stderr)
          raise SystemExit(1)
          PY

      - name: Trigger website deployment
        env:
          WEBHOOK_URL: ${{ vars.GRAYHAVEN_DEPLOY_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.GRAYHAVEN_DEPLOY_WEBHOOK_SECRET }}
          WEBHOOK_DISABLE_SSL_VERIFICATION: ${{ vars.GRAYHAVEN_DEPLOY_DISABLE_SSL_VERIFICATION }}
          WEBHOOK_DISABLED: ${{ vars.GRAYHAVEN_DEPLOY_WEBHOOK_DISABLE }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
          GITHUB_REF_NAME_FULL: ${{ github.ref }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
          GITHUB_ACTOR_NAME: ${{ github.actor }}
        run: |
          python3 - <<'PY'
          import hashlib
          import hmac
          import json
          import os
          import ssl
          import sys
          import urllib.error
          import urllib.request

          if os.environ.get("WEBHOOK_DISABLED", "") == "true":
              print("Deployment webhook is disabled")
              raise SystemExit(0)

          webhook_url = os.environ.get("WEBHOOK_URL", "").strip()
          webhook_secret = os.environ.get("WEBHOOK_SECRET", "")
          disable_ssl_verification = os.environ.get("WEBHOOK_DISABLE_SSL_VERIFICATION", "").lower() == "true"
          repository = os.environ["GITHUB_REPOSITORY_NAME"]
          ssl_context = ssl._create_unverified_context() if disable_ssl_verification else None

          if not webhook_url:
              raise SystemExit("GRAYHAVEN_DEPLOY_WEBHOOK_URL is not configured")
          if not webhook_secret:
              raise SystemExit("GRAYHAVEN_DEPLOY_WEBHOOK_SECRET is not configured")

          payload = {
              "ref": os.environ["GITHUB_REF_NAME_FULL"],
              "after": os.environ["GITHUB_SHA_VALUE"],
              "repository": {
                  "full_name": repository,
                  "clone_url": f"https://github.com/{repository}.git",
                  "html_url": f"https://github.com/{repository}",
              },
              "sender": {
                  "login": os.environ["GITHUB_ACTOR_NAME"],
              },
          }
          body = json.dumps(payload, separators=(",", ":"), sort_keys=True).encode("utf-8")
          signature = hmac.new(webhook_secret.encode("utf-8"), body, hashlib.sha256).hexdigest()
          request = urllib.request.Request(
              webhook_url,
              data=body,
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "personal-web-deploy-action",
                  "X-GitHub-Event": "push",
                  "X-Hub-Signature-256": f"sha256={signature}",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(request, timeout=60, context=ssl_context) as response:
                  response_body = response.read().decode("utf-8", errors="replace").strip()
          except urllib.error.HTTPError as exc:
              error_body = exc.read().decode("utf-8", errors="replace").strip()
              print(error_body, file=sys.stderr)
              raise

          print(response_body)
          PY
