---
name: Deploy

"on":
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      (
        github.event_name == 'workflow_run'
        && github.event.workflow_run.conclusion == 'success'
        && (
          github.event.workflow_run.head_branch == 'main'
          || github.event.workflow_run.head_branch == 'dev'
        )
        && !contains(github.event.workflow_run.head_commit.message, '[skip deploy]')
      )
      || (
        github.event_name == 'workflow_dispatch'
        && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
      )

    steps:
      - name: Trigger website deployment
        env:
          WEBHOOK_URL: ${{ vars.GRAYHAVEN_DEPLOY_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.GRAYHAVEN_DEPLOY_WEBHOOK_SECRET }}
          WEBHOOK_DISABLE_SSL_VERIFICATION: ${{ vars.GRAYHAVEN_DEPLOY_DISABLE_SSL_VERIFICATION }}
          WEBHOOK_DISABLED: ${{ vars.GRAYHAVEN_DEPLOY_WEBHOOK_DISABLE }}
          WORKFLOW_EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_RUN_ACTOR: ${{ github.event.workflow_run.triggering_actor.login }}
          WORKFLOW_DISPATCH_REPOSITORY: ${{ github.repository }}
          WORKFLOW_DISPATCH_REF: ${{ github.ref }}
          WORKFLOW_DISPATCH_SHA: ${{ github.sha }}
          WORKFLOW_DISPATCH_ACTOR: ${{ github.actor }}
        run: |
          python3 - <<'PY'
          import hashlib
          import hmac
          import json
          import os
          import ssl
          import sys
          import urllib.error
          import urllib.request

          if os.environ.get("WEBHOOK_DISABLED", "") == "true":
              print("Deployment webhook is disabled")
              raise SystemExit(0)

          event_name = os.environ["WORKFLOW_EVENT_NAME"]
          if event_name == "workflow_run":
              branch = os.environ["WORKFLOW_RUN_BRANCH"]
              repository = os.environ["WORKFLOW_RUN_REPOSITORY"]
              sha = os.environ["WORKFLOW_RUN_SHA"]
              actor = os.environ["WORKFLOW_RUN_ACTOR"]
              ref = f"refs/heads/{branch}"
          else:
              repository = os.environ["WORKFLOW_DISPATCH_REPOSITORY"]
              ref = os.environ["WORKFLOW_DISPATCH_REF"]
              sha = os.environ["WORKFLOW_DISPATCH_SHA"]
              actor = os.environ["WORKFLOW_DISPATCH_ACTOR"]

          webhook_url = os.environ.get("WEBHOOK_URL", "").strip()
          webhook_secret = os.environ.get("WEBHOOK_SECRET", "")
          disable_ssl_verification = os.environ.get("WEBHOOK_DISABLE_SSL_VERIFICATION", "").lower() == "true"
          ssl_context = ssl._create_unverified_context() if disable_ssl_verification else None

          if not webhook_url:
              raise SystemExit("GRAYHAVEN_DEPLOY_WEBHOOK_URL is not configured")
          if not webhook_secret:
              raise SystemExit("GRAYHAVEN_DEPLOY_WEBHOOK_SECRET is not configured")

          payload = {
              "ref": ref,
              "after": sha,
              "repository": {
                  "full_name": repository,
                  "clone_url": f"https://github.com/{repository}.git",
                  "html_url": f"https://github.com/{repository}",
              },
              "sender": {
                  "login": actor,
              },
          }
          body = json.dumps(payload, separators=(",", ":"), sort_keys=True).encode("utf-8")
          signature = hmac.new(webhook_secret.encode("utf-8"), body, hashlib.sha256).hexdigest()
          request = urllib.request.Request(
              webhook_url,
              data=body,
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "personal-web-deploy-action",
                  "X-GitHub-Event": "push",
                  "X-Hub-Signature-256": f"sha256={signature}",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(request, timeout=60, context=ssl_context) as response:
                  response_body = response.read().decode("utf-8", errors="replace").strip()
          except urllib.error.HTTPError as exc:
              error_body = exc.read().decode("utf-8", errors="replace").strip()
              print(error_body, file=sys.stderr)
              raise

          print(response_body)
          PY
