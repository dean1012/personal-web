---
name: CI

"on":
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"

      - name: Install website linting tools
        run: |
          npm install \
            --prefix . \
            --no-audit \
            --no-fund \
            --no-save \
            --no-package-lock \
            @eslint/js@10.0.1 \
            eslint@10.6.0 \
            globals@17.7.0 \
            html-validate@11.5.3 \
            stylelint@17.14.0 \
            stylelint-config-standard@40.0.0

      - name: Validate lint configuration
        run: |
          python3 -m json.tool .vscode/extensions.json >/dev/null
          python3 -m json.tool .vscode/settings.json >/dev/null
          python3 -m json.tool .htmlvalidate.json >/dev/null
          ./node_modules/.bin/eslint --config eslint.config.mjs \
            eslint.config.mjs \
            stylelint.config.cjs
        shell: bash

      - name: Run HTML lint
        run: |
          find site/frontend -maxdepth 1 -type f -name '*.html' -print0 \
            | xargs -0 -r ./node_modules/.bin/html-validate --config .htmlvalidate.json
        shell: bash

      - name: Run CSS lint
        run: |
          if [ -d site/frontend/css ]; then
            find site/frontend/css -maxdepth 1 -type f -name '*.css' -print0 \
              | xargs -0 -r ./node_modules/.bin/stylelint --config stylelint.config.cjs
          fi
        shell: bash

      - name: Run JavaScript lint
        run: |
          if [ -d site/frontend/js ]; then
            find site/frontend/js -maxdepth 1 -type f -name '*.js' -print0 \
              | xargs -0 -r ./node_modules/.bin/eslint --config eslint.config.mjs
          fi
        shell: bash

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c  # v3
        with:
          file_or_dir: .github .markdownlint.yml .yamllint.yml

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd  # v23
        with:
          globs: |
            *.md
            docs/**/*.md

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: >-
      github.event_name == 'push'
      && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
      && !contains(github.event.head_commit.message, '[skip deploy]')
      && vars.GRAYHAVEN_DEPLOY_WEBHOOK_DISABLE != 'true'

    steps:
      - name: Trigger website deployment
        env:
          WEBHOOK_URL: ${{ vars.GRAYHAVEN_DEPLOY_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.GRAYHAVEN_DEPLOY_WEBHOOK_SECRET }}
          WEBHOOK_DISABLE_SSL_VERIFICATION: ${{ vars.GRAYHAVEN_DEPLOY_DISABLE_SSL_VERIFICATION }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
          GITHUB_REF_NAME_FULL: ${{ github.ref }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
          GITHUB_ACTOR_NAME: ${{ github.actor }}
        run: |
          python3 - <<'PY'
          import hashlib
          import hmac
          import json
          import os
          import ssl
          import sys
          import urllib.error
          import urllib.request

          webhook_url = os.environ.get("WEBHOOK_URL", "").strip()
          webhook_secret = os.environ.get("WEBHOOK_SECRET", "")
          disable_ssl_verification = os.environ.get("WEBHOOK_DISABLE_SSL_VERIFICATION", "").lower() == "true"
          repository = os.environ["GITHUB_REPOSITORY_NAME"]
          ssl_context = ssl._create_unverified_context() if disable_ssl_verification else None

          if not webhook_url:
              raise SystemExit("GRAYHAVEN_DEPLOY_WEBHOOK_URL is not configured")
          if not webhook_secret:
              raise SystemExit("GRAYHAVEN_DEPLOY_WEBHOOK_SECRET is not configured")

          payload = {
              "ref": os.environ["GITHUB_REF_NAME_FULL"],
              "after": os.environ["GITHUB_SHA_VALUE"],
              "repository": {
                  "full_name": repository,
                  "clone_url": f"https://github.com/{repository}.git",
                  "html_url": f"https://github.com/{repository}",
              },
              "sender": {
                  "login": os.environ["GITHUB_ACTOR_NAME"],
              },
          }
          body = json.dumps(payload, separators=(",", ":"), sort_keys=True).encode("utf-8")
          signature = hmac.new(webhook_secret.encode("utf-8"), body, hashlib.sha256).hexdigest()
          request = urllib.request.Request(
              webhook_url,
              data=body,
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "personal-web-deploy-action",
                  "X-GitHub-Event": "push",
                  "X-Hub-Signature-256": f"sha256={signature}",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(request, timeout=60, context=ssl_context) as response:
                  response_body = response.read().decode("utf-8", errors="replace").strip()
          except urllib.error.HTTPError as exc:
              error_body = exc.read().decode("utf-8", errors="replace").strip()
              print(error_body, file=sys.stderr)
              raise

          print(response_body)
          PY
